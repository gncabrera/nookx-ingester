<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${pageTitle})}"></head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
<header th:replace="~{fragments/nav :: nav}"></header>
<main class="max-w-7xl mx-auto px-4 py-6 space-y-6">
    <h1 class="text-2xl font-semibold">Pages</h1>

    <form method="get" action="/pages" class="grid grid-cols-2 md:grid-cols-6 gap-2 text-sm">
        <select name="source" class="bg-slate-900 border border-slate-800 rounded px-2 py-1">
            <option value="">All sources</option>
            <option th:each="s : ${sourceCodes}" th:value="${s}" th:text="${s}" th:selected="${s == filterSource}"></option>
        </select>
        <input name="pageType" placeholder="page type" class="bg-slate-900 border border-slate-800 rounded px-2 py-1"
               th:value="${filterPageType}" />
        <select name="fetchStatus" class="bg-slate-900 border border-slate-800 rounded px-2 py-1">
            <option value="">Any fetch</option>
            <option th:each="f : ${fetchStatuses}" th:value="${f}" th:text="${f}" th:selected="${f == filterFetchStatus}"></option>
        </select>
        <select name="parseStatus" class="bg-slate-900 border border-slate-800 rounded px-2 py-1">
            <option value="">Any parse</option>
            <option th:each="p : ${parseStatuses}" th:value="${p}" th:text="${p}" th:selected="${p == filterParseStatus}"></option>
        </select>
        <input name="url" placeholder="url contains" class="bg-slate-900 border border-slate-800 rounded px-2 py-1"
               th:value="${filterUrl}" />
        <button class="rounded bg-blue-600 text-white px-3 py-1 hover:bg-blue-500">Filter</button>
    </form>

    <div class="overflow-x-auto rounded-lg border border-slate-800">
        <table class="min-w-full text-xs">
            <thead class="bg-slate-900 text-slate-300">
            <tr>
                <th class="text-left px-3 py-2">ID</th>
                <th class="text-left px-3 py-2">Source</th>
                <th class="text-left px-3 py-2">Type</th>
                <th class="text-left px-3 py-2">URL</th>
                <th class="text-left px-3 py-2">Fetch</th>
                <th class="text-left px-3 py-2">Parse</th>
                <th class="text-left px-3 py-2">Updated</th>
                <th class="text-left px-3 py-2">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="page : ${pages}" class="border-t border-slate-800">
                <td class="px-3 py-2 font-mono" th:text="${page.id}">1</td>
                <td class="px-3 py-2 font-mono" th:text="${page.sourceCode}">klickypedia</td>
                <td class="px-3 py-2 font-mono" th:text="${page.pageType}">SET_DETAIL</td>
                <td class="px-3 py-2 font-mono truncate max-w-xl" th:text="${page.url}">https://...</td>
                <td class="px-3 py-2"><span class="badge badge-pending" th:text="${page.fetchStatus}">PENDING</span></td>
                <td class="px-3 py-2"><span class="badge badge-pending" th:text="${page.parseStatus}">PENDING</span></td>
                <td class="px-3 py-2 text-slate-400" th:text="${page.updatedAt}">...</td>
                <td class="px-3 py-2 space-x-1 whitespace-nowrap">
                    <form method="post" th:action="@{'/pages/' + ${page.id} + '/re-fetch'}" class="inline">
                        <button class="px-2 py-1 rounded bg-blue-600 text-white text-xs hover:bg-blue-500">Re-fetch</button>
                    </form>
                    <form method="post" th:action="@{'/pages/' + ${page.id} + '/re-parse'}" class="inline">
                        <button class="px-2 py-1 rounded bg-blue-600 text-white text-xs hover:bg-blue-500">Re-parse</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
