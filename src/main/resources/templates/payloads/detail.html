<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${pageTitle})}"></head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
<header th:replace="~{fragments/nav :: nav}"></header>
<main class="max-w-7xl mx-auto px-4 py-6 space-y-6">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-semibold">Payload <span class="font-mono" th:text="${payload.id}">1</span></h1>
        <form method="post" th:action="@{'/payloads/' + ${payload.id} + '/re-push'}">
            <button class="px-3 py-1 rounded bg-blue-600 text-white hover:bg-blue-500">Re-push</button>
        </form>
    </div>

    <section class="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
        <div class="rounded-lg bg-slate-900 border border-slate-800 p-3">
            <div class="text-xs text-slate-400 uppercase">Source</div>
            <div class="font-mono" th:text="${payload.sourceCode}">...</div>
        </div>
        <div class="rounded-lg bg-slate-900 border border-slate-800 p-3">
            <div class="text-xs text-slate-400 uppercase">Target</div>
            <div class="font-mono" th:text="${payload.ingestTargetCode}">...</div>
        </div>
        <div class="rounded-lg bg-slate-900 border border-slate-800 p-3">
            <div class="text-xs text-slate-400 uppercase">External ID</div>
            <div class="font-mono" th:text="${payload.externalId}">...</div>
        </div>
        <div class="rounded-lg bg-slate-900 border border-slate-800 p-3">
            <div class="text-xs text-slate-400 uppercase">Push status</div>
            <div class="font-semibold" th:text="${payload.pushStatus}">PENDING</div>
        </div>
        <div class="rounded-lg bg-slate-900 border border-slate-800 p-3">
            <div class="text-xs text-slate-400 uppercase">Retries</div>
            <div th:text="${payload.pushRetryCount}">0</div>
        </div>
        <div class="rounded-lg bg-slate-900 border border-slate-800 p-3">
            <div class="text-xs text-slate-400 uppercase">External ref</div>
            <div class="font-mono" th:text="${payload.externalRef}">-</div>
        </div>
        <div class="rounded-lg bg-slate-900 border border-slate-800 p-3 col-span-2">
            <div class="text-xs text-slate-400 uppercase">Last error</div>
            <div class="font-mono text-xs text-red-300 break-all" th:text="${payload.pushLastError}">-</div>
        </div>
    </section>

    <section>
        <h2 class="text-lg font-semibold mb-2">Payload JSON</h2>
        <pre class="bg-slate-900 border border-slate-800 rounded p-3 text-xs overflow-auto" th:text="${payload.payloadJson}">{}</pre>
    </section>

    <section>
        <h2 class="text-lg font-semibold mb-2">Assets</h2>
        <div class="overflow-x-auto rounded-lg border border-slate-800">
            <table class="min-w-full text-xs">
                <thead class="bg-slate-900 text-slate-300">
                <tr>
                    <th class="text-left px-3 py-2">ID</th>
                    <th class="text-left px-3 py-2">Sort</th>
                    <th class="text-left px-3 py-2">Kind</th>
                    <th class="text-left px-3 py-2">URL</th>
                    <th class="text-left px-3 py-2">Downloaded</th>
                    <th class="text-left px-3 py-2">Push</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="a : ${assets}" class="border-t border-slate-800">
                    <td class="px-3 py-2 font-mono" th:text="${a.id}">1</td>
                    <td class="px-3 py-2" th:text="${a.sortOrder}">0</td>
                    <td class="px-3 py-2" th:text="${a.kind}">IMAGE</td>
                    <td class="px-3 py-2 font-mono break-all" th:text="${a.externalUrl}">https://...</td>
                    <td class="px-3 py-2" th:text="${a.downloaded}">false</td>
                    <td class="px-3 py-2" th:text="${a.pushStatus}">PENDING</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
