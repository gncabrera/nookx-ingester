<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${pageTitle})}"></head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
<header th:replace="~{fragments/nav :: nav}"></header>
<main class="max-w-7xl mx-auto px-4 py-6 space-y-4">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-semibold">Logs</h1>
        <span class="text-xs text-slate-400 font-mono" th:text="${logFile}">logs/nookx-ingester.log</span>
    </div>

    <pre th:fragment="tail" id="log-tail"
         th:attr="hx-get='/logs/tail', hx-trigger=|every ${pollIntervalMs}ms|, hx-swap='outerHTML'"
         class="bg-slate-900 border border-slate-800 rounded p-3 text-xs font-mono overflow-auto max-h-[70vh] whitespace-pre-wrap"
         th:text="${logContent}">log content</pre>
</main>
</body>
</html>
